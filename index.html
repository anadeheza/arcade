<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Station</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <h1>ANA'S ARCADE</h1>
            <p class="blink">CLICK ANYWHERE TO START</p>
        </div>
    </div>

    <main class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Arcade</h2>
            </div>
            <nav class="game-list">
                <button class="nav-btn active" id="home-btn" onclick="loadGame('home')">Home</button>
                
                <button class="nav-btn" onclick="loadGame('sudoku')">Sudoku</button>
                <button class="nav-btn" onclick="loadGame('memotest')">Memotest</button>
                <button class="nav-btn" onclick="loadGame('space-evasion')">Space Evasion</button>
                
            </nav>
            <div class="sidebar-footer">
                <a href="https://github.com/anadeheza">>GitHub</a>
                <a href="https://www.instagram.com/anadehezaa/">>Instagram</a>
            </div>
        </aside>

        <section class="stage">
            <header class="stage-header">
                <h1 id="game-title"></h1>
            </header>
            
            <div class="game-viewport" id="viewport"></div>

            <div class="game-controls">
                <button id="reset-btn">Reset</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
